# 网关服务基础配置。
# 负责统一入口路由、聚合 Swagger 以及网关层令牌校验参数。
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
    gateway:
      # 统一维护各微服务的业务路由与 Swagger 路由。
      routes:
        - id: auth-center
          uri: lb://auth-center
          predicates:
            - Path=/api/auth-center/**
        - id: data-source
          uri: lb://data-source
          predicates:
            - Path=/api/data-source/**
        - id: data-metadata
          uri: lb://data-metadata
          predicates:
            - Path=/api/data-metadata/**
        - id: iot-device
          uri: lb://iot-device
          predicates:
            - Path=/api/iot-device/**
        - id: iot-collection
          uri: lb://iot-collection
          predicates:
            - Path=/api/iot-collection/**
        - id: bms-service
          uri: lb://bms-service
          predicates:
            - Path=/api/bms/**
        - id: auth-swagger
          uri: lb://auth-center
          predicates:
            - Path=/auth/swagger-ui.html,/auth/swagger-ui/**,/auth/v3/api-docs,/auth/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: source-swagger
          uri: lb://data-source
          predicates:
            - Path=/source/swagger-ui.html,/source/swagger-ui/**,/source/v3/api-docs,/source/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: metadata-swagger
          uri: lb://data-metadata
          predicates:
            - Path=/metadata/swagger-ui.html,/metadata/swagger-ui/**,/metadata/v3/api-docs,/metadata/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: iot-device-swagger
          uri: lb://iot-device
          predicates:
            - Path=/iot-device/swagger-ui.html,/iot-device/swagger-ui/**,/iot-device/v3/api-docs,/iot-device/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: iot-collection-swagger
          uri: lb://iot-collection
          predicates:
            - Path=/iot-collection/swagger-ui.html,/iot-collection/swagger-ui/**,/iot-collection/v3/api-docs,/iot-collection/v3/api-docs/**
          filters:
            - StripPrefix=1
        - id: bms-swagger
          uri: lb://bms-service
          predicates:
            - Path=/bms/swagger-ui.html,/bms/swagger-ui/**,/bms/v3/api-docs,/bms/v3/api-docs/**
          filters:
            - StripPrefix=1

springdoc:
  # 聚合后的 Swagger UI 入口配置。
  api-docs:
    enabled: true
    groups:
      enabled: false
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls-primary-name: Auth Center
    urls:
      - name: Auth Center
        url: /auth/v3/api-docs
      - name: BMS Service
        url: /bms/v3/api-docs
      - name: Data Source Service
        url: /source/v3/api-docs
      - name: IoT Device Service
        url: /iot-device/v3/api-docs
      - name: IoT Collection Service
        url: /iot-collection/v3/api-docs

auth-center:
  # 网关解析 JWT 时需要与认证中心保持一致的签名密钥。
  jwt-secret: ${AUTH_CENTER_JWT_SECRET:governance-auth-center-jwt-secret-please-change-it}

gateway:
  auth:
    # 仅对 /api/ 前缀的业务接口启用网关鉴权，静态资源与聚合 Swagger 不走该规则。
    required-prefix: /api/
    internal-token: ${GATEWAY_TRUSTED_TOKEN:change-me-gateway-token}
    cookie-name: ${AUTH_CENTER_AUTH_COOKIE_NAME:governance_access_token}
    cookie-path: ${AUTH_CENTER_AUTH_COOKIE_PATH:/}
    cookie-secure: ${AUTH_CENTER_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${AUTH_CENTER_AUTH_COOKIE_SAME_SITE:Lax}

management:
  endpoints:
    web:
      exposure:
        include: health,info
