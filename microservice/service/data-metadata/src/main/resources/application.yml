# 元数据服务配置。
# 负责采集任务管理、工作台统计，并依赖数据源服务查询主数据。
server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: data-metadata
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    # 默认连接本地或容器内 MySQL，可通过环境变量覆盖。
    url: ${DB_URL:jdbc:mysql://localhost:3306/data_metadata_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mayunlong}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

integration:
  data-source-service:
    # 创建任务和聚合工作台时，通过该内部接口访问数据源服务。
    name: ${DATA_SOURCE_SERVICE_NAME:data-source}
    path: ${DATA_SOURCE_SERVICE_PATH:/internal/data-sources}

security:
  gateway:
    trusted-token: ${GATEWAY_TRUSTED_TOKEN:change-me-gateway-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info
