spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/governance_demo?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mayunlong}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

auth-center:
  jwt-secret: ${AUTH_CENTER_JWT_SECRET:governance-auth-center-jwt-secret-please-change-it}
  jwt-expire-seconds: ${AUTH_CENTER_JWT_EXPIRE_SECONDS:86400}
  admin:
    username: ${AUTH_CENTER_ADMIN_USERNAME:admin}
    password: ${AUTH_CENTER_ADMIN_PASSWORD:Admin@123456}
    nickname: ${AUTH_CENTER_ADMIN_NICKNAME:System Admin}
